# Mirror of ../.streamlit/config.toml — used when Streamlit is launched from
# inside gui/ (e.g. `cd gui && streamlit run ucmuon_gui.py`). Streamlit reads
# config from the launch directory, before the script chdir's to project root.

[global]
# The GUI restores autosaved widget values via st.session_state before the
# widgets render (see load_settings in ucmuon_gui.py). Streamlit would
# otherwise show a spurious "widget ... was created with a default value but
# also had its value set via the Session State API" warning on every fresh
# session — the intended behaviour here, so silence it.
disableWidgetStateDuplicationWarning = true

[server]
# Raised from the default 200 MB to handle large muon files (10M+ muons).
maxMessageSize = 500

[browser]
gatherUsageStats = false
